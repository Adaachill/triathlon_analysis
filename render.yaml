services:
  - type: web
    name: triathlon-analysis-api
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false      # Renderダッシュボードで手動設定（Neonの接続文字列）
      - key: PYTHON_VERSION
        value: 3.11.0
